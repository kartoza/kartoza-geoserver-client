# Pre-commit configuration for Kartoza CloudBench
# Install: pre-commit install
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.12
        args: ['--config', 'pyproject.toml']

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.1
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
      - id: ruff-format

  # Python type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs>=5.0
          - djangorestframework-stubs>=3.14
          - types-requests>=2.31
          - pydantic>=2.7
        args: ['--config-file', 'pyproject.toml']
        exclude: ^(tests/|migrations/)

  # TypeScript/JavaScript linting
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd web && npm run lint'
        language: system
        files: ^web/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # Python tests (fast unit tests only)
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest-unit
        entry: pytest -m "unit" --tb=short -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  # Frontend tests (fast only)
  - repo: local
    hooks:
      - id: vitest
        name: vitest
        entry: bash -c 'cd web && npm run test -- --run --reporter=dot'
        language: system
        files: ^web/src/.*\.(ts|tsx)$
        pass_filenames: false

  # Spell check
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        args: ['--skip', '*.json,*.lock,*.min.js,*.min.css,node_modules,dist,build,.git']
        exclude: ^(web/node_modules/|\.git/)

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ['-r', 'apps', 'cloudbench', 'tui', '-ll', '-x', '*/tests/*']
        exclude: ^tests/

# CI-specific configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [eslint, vitest, pytest-unit]  # Skip in CI, run separately
  submodules: false
