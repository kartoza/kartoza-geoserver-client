version: '3.9'

volumes:
  static-data:
  media-data:
  cloudbench-folder:

services:
  django:
    image: kartoza/cloudbench:${CLOUDBENCH_TAG:-latest}
    env_file: .env
    environment:
      - CLOUDBENCH_DATA_FOLDER=${CLOUDBENCH_DATA_FOLDER:-/home/web/cloudbench_data}
    volumes:
      - static-data:/app/staticfiles
      - media-data:/app/media
      - cloudbench-folder:${CLOUDBENCH_DATA_FOLDER:-/home/web/cloudbench_data}
    expose:
      - "8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/sites-enabled:/etc/nginx/conf.d:ro
      - static-data:/app/staticfiles:ro
      - media-data:/app/media:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      django:
        condition: service_healthy
    restart: on-failure